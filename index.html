<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superbooth 2026 — Events</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --bg: #f8f8f8;
    --blue:   #1d6ff2;
    --blue2:  #0047cc;
    --teal:   #00b8a9;
    --lime:   #84cc16;
    --orange: #ff6b00;
    --yellow: #fbbf24;
    --fav:    #ff6b00;
    --ink: #111111;
    --ink-light: #444444;
    --ink-faint: #888888;
    --border: #e5e5e5;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:'Lato',sans-serif; min-height:100vh; overflow-x:hidden; padding-bottom:3.5rem; }

  /* Header */
  header { background:var(--white); border-bottom:2px solid var(--ink); padding:0 2.5rem; position:sticky; top:0; z-index:100; }
  .header-inner { max-width:1180px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:72px; gap:2rem; }
  .logo-block { line-height:1.2; }
  .logo-title { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; color:var(--ink); }
  .logo-title span { color:var(--blue); }
  .logo-sub { font-size:0.68rem; color:var(--ink-faint); letter-spacing:0.1em; text-transform:uppercase; margin-top:1px; }
  .header-right { display:flex; align-items:center; gap:1rem; }
  .date-pill { font-size:0.7rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--white); background:var(--ink); padding:0.38rem 1rem; border-radius:20px; }
  .fav-count-btn { display:flex; align-items:center; gap:0.4rem; background:var(--orange); border:none; cursor:pointer; color:white; font-family:'Lato',sans-serif; font-size:0.75rem; font-weight:700; letter-spacing:0.04em; padding:0.4rem 1rem; border-radius:20px; transition:opacity 0.18s; }
  .fav-count-btn:hover { opacity:0.85; }

  /* Hero */
  .hero-band { background:var(--white); border-bottom:1px solid var(--border); padding:2.5rem 2.5rem 2rem; text-align:center; position:relative; overflow:hidden; }
  .hero-band::before { content:''; position:absolute; width:340px; height:340px; border-radius:50%; background:var(--blue); opacity:0.07; top:-120px; left:-80px; pointer-events:none; }
  .hero-band::after { content:''; position:absolute; width:260px; height:260px; border-radius:50%; background:var(--blue2); opacity:0.07; bottom:-100px; right:-60px; pointer-events:none; }
  .hero-eyebrow { display:inline-block; font-size:0.68rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--white); background:var(--blue2); font-weight:700; padding:0.25rem 0.85rem; border-radius:20px; margin-bottom:1rem; }
  .hero-title { font-family:'Playfair Display',serif; font-size:clamp(2rem,5vw,3.4rem); font-weight:700; color:var(--ink); line-height:1.12; margin-bottom:0.5rem; }
  .hero-title em { font-style:italic; font-weight:400; color:var(--blue); }
  .hero-sub { font-family:'Cormorant Garamond',serif; font-size:1.1rem; color:var(--ink-faint); font-style:italic; }

  /* Tabs for days */
  .day-tabs { background:var(--white); border-bottom:2px solid var(--border); padding:0 2.5rem; position:sticky; top:72px; z-index:91; display:flex; gap:0; }
  .day-tab { padding:1rem 1.5rem; font-size:0.82rem; font-weight:700; cursor:pointer; border:none; background:none; color:var(--ink-faint); border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.15s; letter-spacing:0.02em; }
  .day-tab:hover { color:var(--blue); }
  .day-tab.active { color:var(--blue); border-bottom-color:var(--blue); }

  /* Filter bar */
  .filter-bar { background:var(--bg); border-bottom:1px solid var(--border); padding:0.85rem 2.5rem; position:sticky; top:125px; z-index:90; }
  .filter-inner { max-width:1180px; margin:0 auto; display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }
  .filter-label { font-size:0.66rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-faint); font-weight:700; margin-right:0.25rem; }
  .pill { background:none; border:1.5px solid var(--border); color:var(--ink-light); font-family:'Lato',sans-serif; font-size:0.74rem; font-weight:700; padding:0.3rem 0.9rem; border-radius:20px; cursor:pointer; transition:all 0.15s; }
  .pill:hover { border-color:var(--blue); color:var(--blue); background:rgba(29,111,242,0.05); }
  .pill.active { background:var(--blue); border-color:var(--blue); color:white; }
  .pill[data-filter="favorites"].active { background:var(--orange); border-color:var(--orange); }
  .pill[data-filter="favorites"]:hover { border-color:var(--orange); color:var(--orange); background:rgba(255,107,0,0.05); }

  /* Main */
  main { max-width:1180px; margin:0 auto; padding:2rem 2.5rem; }
  .day-section { display:none; }
  .day-section.active { display:block; }

  .day-header { display:flex; align-items:center; gap:1.25rem; margin-bottom:1.75rem; }
  .day-header h2 { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; color:var(--ink); white-space:nowrap; }
  .day-header .count-badge { font-size:0.78rem; color:var(--ink-faint); background:var(--border); padding:0.2rem 0.65rem; border-radius:20px; }
  .day-header::after { content:''; flex:1; height:1px; background:var(--border); }

  /* Grid */
  .events-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1.1rem; }

  /* Card */
  .event-card { background:var(--white); border:1.5px solid var(--border); border-radius:12px; overflow:hidden; transition:box-shadow 0.2s,transform 0.2s; display:flex; flex-direction:column; position:relative; animation:rise 0.35s ease both; }
  @keyframes rise { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .event-card:hover { box-shadow:0 6px 28px rgba(0,0,0,0.09); transform:translateY(-2px); }
  .event-card.favorited { border-color:var(--orange); box-shadow:0 0 0 2px var(--orange); }
  .event-card.favorited::after { content:'♥ Saved'; position:absolute; top:12px; right:-1px; background:var(--orange); color:white; font-family:'Lato',sans-serif; font-size:0.58rem; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; padding:0.2rem 0.55rem 0.2rem 0.48rem; border-radius:4px 0 0 4px; pointer-events:none; z-index:3; }
  .event-card.favorited .card-title { color:var(--orange); }
  .event-card.favorited .fav-btn { background:var(--orange); border-color:var(--orange); color:white; }
  .event-card.hidden { display:none; }

  /* Card band */
  .card-band { height:4px; flex-shrink:0; }
  .cat-diy      .card-band { background:var(--orange); }
  .cat-flinta   .card-band { background:var(--teal); }
  .cat-workshop .card-band { background:var(--blue2); }
  .cat-concert  .card-band { background:var(--blue); }
  .cat-lecture  .card-band { background:var(--lime); }
  .cat-talk     .card-band { background:var(--yellow); }
  .cat-radio    .card-band { background:#a855f7; }
  .cat-ambient  .card-band { background:var(--teal); }
  .cat-evening  .card-band { background:#e11d48; }
  .cat-special  .card-band { background:var(--ink-faint); }

  .card-body { padding:1.1rem 1.3rem 1rem; flex:1; display:flex; flex-direction:column; }
  .card-meta { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.65rem; flex-wrap:wrap; }
  .card-time { font-size:0.7rem; font-weight:700; color:var(--ink-light); background:var(--bg); padding:0.16rem 0.5rem; border-radius:6px; }
  .meta-dot { width:3px; height:3px; border-radius:50%; background:var(--border); flex-shrink:0; }
  .card-venue { font-family:'Cormorant Garamond',serif; font-size:0.88rem; color:var(--ink-faint); font-style:italic; }
  .type-tag { margin-left:auto; font-size:0.58rem; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; padding:0.18rem 0.55rem; border-radius:20px; color:white; flex-shrink:0; }
  .cat-diy      .type-tag { background:var(--orange); }
  .cat-flinta   .type-tag { background:var(--teal); }
  .cat-workshop .type-tag { background:var(--blue2); }
  .cat-concert  .type-tag { background:var(--blue); }
  .cat-lecture  .type-tag { background:var(--lime); color:#1a3a00; }
  .cat-talk     .type-tag { background:var(--yellow); color:#5a3800; }
  .cat-radio    .type-tag { background:#a855f7; }
  .cat-ambient  .type-tag { background:var(--teal); }
  .cat-evening  .type-tag { background:#e11d48; }
  .cat-special  .type-tag { background:var(--ink-faint); }

  .card-title { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; color:var(--ink); line-height:1.25; margin-bottom:0.5rem; transition:color 0.15s; }

  /* Description */
  .card-desc { font-size:0.81rem; line-height:1.7; color:var(--ink-light); font-weight:300; padding:0.5rem 0 0.75rem; }

  /* Footer */
  .card-footer { display:flex; align-items:center; justify-content:space-between; padding-top:0.75rem; border-top:1px solid var(--border); margin-top:auto; gap:0.5rem; }
  .sb-link { font-size:0.68rem; font-weight:700; color:var(--white); background:var(--blue); padding:0.26rem 0.7rem; border-radius:20px; text-decoration:none; transition:background 0.15s; flex-shrink:0; }
  .sb-link:hover { background:var(--blue2); }
  .fav-btn { display:flex; align-items:center; gap:0.35rem; background:none; border:1.5px solid var(--border); color:var(--ink-faint); font-family:'Lato',sans-serif; font-size:0.68rem; font-weight:700; letter-spacing:0.04em; padding:0.28rem 0.8rem; border-radius:20px; cursor:pointer; transition:all 0.15s; white-space:nowrap; flex-shrink:0; }
  .fav-btn:hover { border-color:var(--orange); color:var(--orange); background:rgba(255,107,0,0.05); }
  .fav-btn.active { background:var(--orange); border-color:var(--orange); color:white; }


  /* Detail button */
  .detail-btn { display:flex; align-items:center; gap:0.3rem; background:none; border:1.5px solid var(--border); color:var(--ink-faint); font-family:'Lato',sans-serif; font-size:0.68rem; font-weight:700; letter-spacing:0.04em; padding:0.28rem 0.75rem; border-radius:20px; cursor:pointer; transition:all 0.15s; white-space:nowrap; flex-shrink:0; }
  .detail-btn:hover { border-color:var(--blue); color:var(--blue); background:rgba(29,111,242,0.05); }
  .detail-btn.loading { opacity:0.5; cursor:wait; }

  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:500; align-items:center; justify-content:center; padding:1.5rem; backdrop-filter:blur(3px); }
  .modal-overlay.open { display:flex; }
  .modal-box { background:var(--white); border-radius:16px; max-width:620px; width:100%; max-height:85vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.2); animation:modalIn 0.22s ease; position:relative; }
  @keyframes modalIn { from{opacity:0;transform:translateY(16px) scale(0.98)} to{opacity:1;transform:none} }
  .modal-band { height:5px; flex-shrink:0; }
  .modal-header { padding:1.4rem 1.6rem 0; }
  .modal-category { display:inline-block; font-size:0.58rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:0.2rem 0.6rem; border-radius:20px; color:white; margin-bottom:0.75rem; }
  .modal-title { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; color:var(--ink); line-height:1.2; margin-bottom:0.85rem; }
  .modal-meta { display:flex; flex-wrap:wrap; gap:0.55rem 1.1rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
  .modal-meta-item { display:flex; align-items:center; gap:0.35rem; font-size:0.78rem; color:var(--ink-light); }
  .modal-meta-item svg { flex-shrink:0; opacity:0.5; }
  .modal-body { padding:1.1rem 1.6rem 1.5rem; overflow-y:auto; flex:1; }
  .modal-details { font-size:0.88rem; line-height:1.8; color:var(--ink-light); font-weight:300; white-space:pre-wrap; }
  .modal-no-details { font-family:'Cormorant Garamond',serif; font-size:1rem; font-style:italic; color:var(--ink-faint); text-align:center; padding:1.5rem 0; }
  .modal-footer { padding:1rem 1.6rem; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-shrink:0; }
  .modal-close { background:none; border:1.5px solid var(--border); color:var(--ink-faint); font-family:'Lato',sans-serif; font-size:0.72rem; font-weight:700; letter-spacing:0.04em; padding:0.35rem 1rem; border-radius:20px; cursor:pointer; transition:all 0.15s; }
  .modal-close:hover { border-color:var(--ink); color:var(--ink); }
  .modal-sb-link { font-size:0.68rem; font-weight:700; color:var(--white); background:var(--blue); padding:0.35rem 0.9rem; border-radius:20px; text-decoration:none; transition:background 0.15s; }
  .modal-sb-link:hover { background:var(--blue2); }

  /* No results */
  .no-results { display:none; text-align:center; padding:3rem 2rem; font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-style:italic; color:var(--ink-faint); }

  /* Page footer */
  .page-footer { background:var(--ink); color:#666; text-align:center; padding:1rem; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; position:fixed; bottom:0; left:0; right:0; z-index:100; }
  .page-footer em { color:var(--blue); font-style:normal; }

  /* All-days view: space between day blocks */
  .day-section[data-day="all"] .day-header { margin-top:2.5rem; }
  .day-section[data-day="all"] .day-header:first-child { margin-top:0; }

  @media (max-width:700px) {
    .events-grid { grid-template-columns:1fr; }
    header,.filter-bar,.day-tabs,main,.hero-band { padding-left:1.25rem; padding-right:1.25rem; }
    .day-tab { padding:0.9rem 0.9rem; font-size:0.76rem; }
  }
</style>
</head>

<header>

  const CAT_LABELS = {
    diy:'DIY Workshop', flinta:'FLINTA*', workshop:'Workshop',
    concert:'Concert', lecture:'Lecture Concert', talk:'Talk',
    radio:'Radio', ambient:'Ambient', evening:'Evening', special:'Special'
  };

  const favorites = new Set(JSON.parse(localStorage.getItem('sb26-favs2') || '[]'));
  let activeFilter = 'all';
  let showFavs = false;
  let activeDay = 'Thursday May 7th';

  /* ── Build HTML ── */
  function buildAll() {
    const main = document.getElementById('main');
    main.innerHTML = '';
    let globalId = 0;

    // Build the "all days" section first
    const allSection = document.createElement('div');
    allSection.className = 'day-section';
    allSection.dataset.day = 'all';

    for (const [day, events] of Object.entries(EVENTS)) {
      const hdr = document.createElement('div');
      hdr.className = 'day-header';
      hdr.innerHTML = `<h2>${day}</h2><span class="count-badge" id="count-all-${day.replace(/\s/g,'_')}">${events.length} events</span>`;
      allSection.appendChild(hdr);

      const grid = document.createElement('div');
      grid.className = 'events-grid';
      grid.id = 'allgrid-' + day.replace(/\s/g,'_');

      events.forEach((ev, i) => {
        globalId++;
        const id = globalId;
        ev._id_all = id;
        const card = buildCard(ev, id);
        card.style.animationDelay = (i * 0.015) + 's';
        grid.appendChild(card);
      });
      allSection.appendChild(grid);

      const noRes = document.createElement('div');
      noRes.className = 'no-results';
      noRes.id = 'nores-all-' + day.replace(/\s/g,'_');
      allSection.appendChild(noRes);
    }
    main.appendChild(allSection);

    // Reset globalId for per-day sections so IDs don't clash
    // Each per-day card gets a unique id via a separate counter
    let dayId = 10000;

    for (const [day, events] of Object.entries(EVENTS)) {
      const section = document.createElement('div');
      section.className = 'day-section' + (day === activeDay ? ' active' : '');
      section.dataset.day = day;

      const hdr = document.createElement('div');
      hdr.className = 'day-header';
      hdr.innerHTML = `<h2>${day}</h2><span class="count-badge" id="count-${day.replace(/\s/g,'_')}">${events.length} events</span>`;
      section.appendChild(hdr);

      const grid = document.createElement('div');
      grid.className = 'events-grid';
      grid.id = 'grid-' + day.replace(/\s/g,'_');

      events.forEach((ev, i) => {
        dayId++;
        const id = dayId;
        const card = buildCard(ev, id);
        card.style.animationDelay = (i * 0.025) + 's';
        grid.appendChild(card);
      });
      section.appendChild(grid);

      const noRes = document.createElement('div');
      noRes.className = 'no-results';
      noRes.id = 'nores-' + day.replace(/\s/g,'_');
      noRes.textContent = 'No events match this filter.';
      section.appendChild(noRes);

      main.appendChild(section);
    }
    restoreFavs();
  }

  function buildCard(ev, id) {
    const slug = ev.slug.replace('.html','');
    const sbUrl = BASE_URL + ev.slug;
    const card = document.createElement('div');
    card.className = `event-card cat-${ev.category}`;
    card.dataset.id = id;
    card.dataset.category = ev.category;
    card.dataset.slug = slug;
    if (favorites.has(id)) { card.classList.add('favorited'); }

    card.innerHTML = `
      <div class="card-band"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-time">${escHtml(ev.time)}</span>
          <div class="meta-dot"></div>
          <span class="card-venue">${escHtml(ev.venue)}</span>
          <span class="type-tag">${CAT_LABELS[ev.category] || ev.category}</span>
        </div>
        <div class="card-title">${escHtml(ev.title)}</div>
        <div class="card-footer">
          <button class="detail-btn">Details</button>
          <a class="sb-link" href="${sbUrl}">Superbooth ↗</a>
          <button class="fav-btn${favorites.has(id) ? ' active' : ''}"><span>♥</span> Save</button>
        </div>
      </div>`;
    return card;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }


  /* ── Filtering ── */
  function applyFilter() {
    const activeSections = document.querySelectorAll('.day-section.active');
    activeSections.forEach(section => {
      const isAll = section.dataset.day === 'all';
      if (isAll) {
        // For the all-days view, filter each sub-grid independently
        Object.keys(EVENTS).forEach(day => {
          const key = day.replace(/\s/g,'_');
          const grid = document.getElementById('allgrid-' + key);
          if (!grid) return;
          const cards = grid.querySelectorAll('.event-card');
          let visible = 0;
          cards.forEach(card => {
            const cat = card.dataset.category;
            const slug = card.dataset.slug;
            let show;
            if (showFavs) show = favorites.has(slug);
            else if (activeFilter === 'all') show = true;
            else show = cat === activeFilter;
            card.classList.toggle('hidden', !show);
            if (show) visible++;
          });
          const badge = document.getElementById('count-all-' + key);
          if (badge) badge.textContent = visible + ' event' + (visible !== 1 ? 's' : '');
          const noRes = document.getElementById('nores-all-' + key);
          if (noRes) noRes.style.display = visible === 0 ? 'block' : 'none';
        });
      } else {
        const cards = section.querySelectorAll('.event-card');
        let visible = 0;
        cards.forEach(card => {
          const cat = card.dataset.category;
          const slug = card.dataset.slug;
          let show;
          if (showFavs) show = favorites.has(slug);
          else if (activeFilter === 'all') show = true;
          else show = cat === activeFilter;
          card.classList.toggle('hidden', !show);
          if (show) visible++;
        });
        const dayKey = section.dataset.day.replace(/\s/g,'_');
        const badge = document.getElementById('count-' + dayKey);
        if (badge) badge.textContent = visible + ' event' + (visible !== 1 ? 's' : '');
        const noRes = document.getElementById('nores-' + dayKey);
        if (noRes) noRes.style.display = visible === 0 ? 'block' : 'none';
      }
    });
  }

  /* ── Day tabs ── */
  function switchDay(dayName) {
    activeDay = dayName;
    document.querySelectorAll('.day-tab').forEach(t => t.classList.toggle('active', t.dataset.day === dayName));
    document.querySelectorAll('.day-section').forEach(s => s.classList.toggle('active', s.dataset.day === dayName));
    applyFilter();
  }

  /* ── Favourites ── */
  // Use slug as the stable key (ids differ between all-days and per-day sections)
  function toggleFav(id, btn, card) {
    const slug = card.dataset.slug;
    if (favorites.has(slug)) {
      favorites.delete(slug);
      // unfav all cards with same slug
      document.querySelectorAll(`.event-card[data-slug="${slug}"]`).forEach(c => {
        c.classList.remove('favorited');
        const b = c.querySelector('.fav-btn');
        if (b) b.classList.remove('active');
      });
    } else {
      favorites.add(slug);
      document.querySelectorAll(`.event-card[data-slug="${slug}"]`).forEach(c => {
        c.classList.add('favorited');
        const b = c.querySelector('.fav-btn');
        if (b) b.classList.add('active');
      });
      btn.style.transform = 'scale(1.12)';
      setTimeout(() => btn.style.transform = '', 200);
    }
    localStorage.setItem('sb26-favs2', JSON.stringify([...favorites]));
    updateFavCount();
    if (showFavs) applyFilter();
  }

  function updateFavCount() {
    const n = favorites.size;
    document.getElementById('favCountText').textContent = n === 0 ? 'My favourites' : n + ' saved';
  }

  function restoreFavs() {
    favorites.forEach(slug => {
      document.querySelectorAll(`.event-card[data-slug="${slug}"]`).forEach(c => {
        c.classList.add('favorited');
        const b = c.querySelector('.fav-btn');
        if (b) b.classList.add('active');
      });
    });
    updateFavCount();
  }

  /* ── Events data (from scraper output) ── */
  let eventsDataMap = null; // slug → record, loaded lazily

  function loadEventsData() {
    if (eventsDataMap !== null) return eventsDataMap;
    eventsDataMap = {};
    const arr = window.EVENTS_DETAILS || [];
    arr.forEach(rec => {
      const slug = rec.url.split('/').pop().replace('.html', '');
      eventsDataMap[slug] = rec;
    });
    return eventsDataMap;
  }

  /* ── Modal ── */
  const CAT_COLORS = {
    diy:'var(--orange)', flinta:'var(--teal)', workshop:'var(--blue2)',
    concert:'var(--blue)', lecture:'var(--lime)', talk:'var(--yellow)',
    radio:'#a855f7', ambient:'var(--teal)', evening:'#e11d48', special:'var(--ink-faint)'
  };

  function openModal(slug, ev) {
    const overlay  = document.getElementById('detailModal');
    const band     = document.getElementById('modalBand');
    const catEl    = document.getElementById('modalCategory');
    const titleEl  = document.getElementById('modalTitle');
    const dateEl   = document.getElementById('modalDate');
    const timeEl   = document.getElementById('modalTime');
    const placeEl  = document.getElementById('modalPlace');
    const bodyEl   = document.getElementById('modalDetails');
    const sbLink   = document.getElementById('modalSbLink');

    const color = CAT_COLORS[ev.category] || 'var(--ink-faint)';
    band.style.background = color;
    catEl.style.background = color;
    catEl.style.color = ['lecture','talk'].includes(ev.category) ? '#333' : 'white';
    catEl.textContent = CAT_LABELS[ev.category] || ev.category;
    titleEl.textContent = ev.title;
    placeEl.textContent = ev.venue;

    const data = loadEventsData()[slug] || null;

    if (data) {
      // Parse date string like "2026-05-07" to a readable label
      const d = new Date(data.date + 'T00:00:00');
      const dateStr = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
      dateEl.textContent = dateStr;
      // Time comes from the scraped page — strip the leading date portion if present
      const rawTime = data.time || ev.time;
      timeEl.textContent = rawTime.replace(/^\d{4}-\d{2}-\d{2},\s*/, '');
      sbLink.href = data.url;
      if (data.details) {
        bodyEl.className = 'modal-details';
        bodyEl.textContent = data.details;
      } else {
        bodyEl.className = 'modal-no-details';
        bodyEl.textContent = 'No description available for this event.';
      }
    } else {
      // JSON not loaded yet or slug not found — show what we have
      dateEl.textContent = ev.time;
      timeEl.textContent = ev.venue;
      placeEl.textContent = '';
      bodyEl.className = 'modal-no-details';
      bodyEl.textContent = eventsDataMap === null
        ? 'Loading details…'
        : 'Run the scraper (python3 scrape_events.py) to load event descriptions.';
      sbLink.href = BASE_URL + ev.slug;
    }

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('detailModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  /* ── Event listeners ── */
  document.addEventListener('DOMContentLoaded', () => {
    buildAll();
    loadEventsData(); // preload into cache

    // Card clicks — fav and link only
    document.getElementById('main').addEventListener('click', e => {
      const detailBtn = e.target.closest('.detail-btn');
      if (detailBtn) {
        e.stopPropagation();
        const card = detailBtn.closest('.event-card');
        const slug = card.dataset.slug;
        // Find event data from EVENTS object
        let evObj = null;
        for (const events of Object.values(EVENTS)) {
          evObj = events.find(ev => ev.slug.replace('.html','') === slug);
          if (evObj) break;
        }
        if (!evObj) return;
        openModal(slug, evObj);
        return;
      }

      const favBtn = e.target.closest('.fav-btn');
      if (favBtn) {
        e.stopPropagation();
        const card = favBtn.closest('.event-card');
        toggleFav(parseInt(card.dataset.id), favBtn, card);
        return;
      }
      const sbLink = e.target.closest('.sb-link');
      if (sbLink) return; // let the link work normally
    });

    // Day tabs
    document.querySelectorAll('.day-tab').forEach(tab => {
      tab.addEventListener('click', () => { switchDay(tab.dataset.day); });
    });

    // Filter pills
    document.querySelectorAll('.pill').forEach(pill => {
      pill.addEventListener('click', () => {
        activeFilter = pill.dataset.filter;
        showFavs = activeFilter === 'favorites';
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        applyFilter();
      });
    });

    // Header fav button
    document.getElementById('favCountBtn').addEventListener('click', () => {
      showFavs = true;
      activeFilter = 'favorites';
      document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.filter === 'favorites'));
      applyFilter();
    });

    // Modal close
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    document.getElementById('detailModal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });
  });

})();
</script>
</body>
</html>
